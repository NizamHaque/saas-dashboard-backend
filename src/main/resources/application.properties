spring.application.name=Dashboard
# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=saas_dashboard

# JWT
jwt.secret=MySuperSecretKeyForJWTSigning12345678901234567890
jwt.expiration=86400000
logging.level.org.springframework.web.servlet.mvc.method.annotation=TRACE
# Server
server.port=8080

# File uploads
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Super Admin (separate from tenant users)
superadmin.email=superadmin@saas.com
superadmin.password=SuperAdmin@123