spring.application.name=Dashboard
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/saas_dashboard}
jwt.secret=${JWT_SECRET:MySuperSecretKeyForJWTSigning12345678901234567890}
jwt.expiration=86400000
